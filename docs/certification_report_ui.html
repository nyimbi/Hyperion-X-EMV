ed","boundary":"index only; external report attachments remain required"},{"id":"REPORT-UI","title":"Certification report workbench","path":"docs/certification_report_ui.html","category":"reporting","generator":"cargo run --quiet --example krn_certification_report_ui -- --html","status":"generated","boundary":"static local UI; not a lab portal or approval system"},{"id":"COVERAGE-WORKFLOW","title":"100% coverage workflow","path":"docs/coverage.md; scripts/coverage_100.sh","category":"quality","generator":"scripts/coverage_100.sh","status":"prepared","boundary":"accepted submitted-build report remains external"},{"id":"TUTORIALS","title":"Tutorial and glossary learning path","path":"docs/tutorial/","category":"education","generator":"human-controlled docs","status":"repository-controlled","boundary":"education only; not approval evidence"}],"required_reports":[{"id":"CERT-REPORT-COVERAGE","title":"100% unit coverage report","status":"pending external attachment","required_evidence":"submitted commit, tool versions, target, feature set, and HTML/XML or lab-accepted report","closure_gate":"CERT-OPEN-009"},{"id":"CERT-REPORT-INTEGRATION","title":"Full EMV integration report","status":"pending external attachment","required_evidence":"test-tool version, profile set, device firmware, APDU traces, outcomes, deviations, and disposition","closure_gate":"CERT-OPEN-009"},{"id":"CERT-REPORT-STATIC","title":"Static-analysis report","status":"pending external attachment","required_evidence":"accepted tool version, command lines, findings, remediations, and residual-risk acceptance","closure_gate":"CERT-OPEN-010"},{"id":"CERT-REPORT-FUZZ","title":"Fuzzing/no-crash report","status":"pending external attachment","required_evidence":"engine versions, corpus hashes, run budgets, coverage/path metrics, crashes, and dispositions","closure_gate":"CERT-OPEN-010"},{"id":"CERT-REPORT-CONFORMANCE","title":"Signed conformance template and approval artifact","status":"pending external attachment","required_evidence":"recognized lab or authority-signed template tied to submitted binary, profile, and device scope","closure_gate":"CERT-OPEN-011"},{"id":"CERT-REPORT-DEVICE","title":"Device, L1, and PCI/PED evidence","status":"pending external attachment","required_evidence":"target device approval, reader/L1 evidence, and PCI PTS/PED integration statement","closure_gate":"CERT-OPEN-006; CERT-OPEN-007"}],"tool_commands":[{"id":"UI","title":"Generate certification workbench UI","command":"cargo run --quiet --example krn_certification_report_ui -- --out target/hyperion-cert-ui","output":"target/hyperion-cert-ui/index.html"},{"id":"REPORT-JSON","title":"Emit report-pack JSON","command":"cargo run --quiet --example krn_certification_report_ui -- --json","output":"stdout JSON"},{"id":"REPORT-MD","title":"Emit report-pack Markdown","command":"cargo run --quiet --example krn_certification_report_ui -- --markdown","output":"stdout Markdown"},{"id":"POS","title":"Run basic scripted PoS integration","command":"cargo run --quiet --example krn_basic_pos","output":"stdout JSON transaction summary"}]}
</script><script id="report-markdown" type="text/plain"># Hyperion Certification Report Pack

- Kernel version: 0.1.0
- ABI version: 2
- Scope: repository-controlled report production and certification preparation

## Repository Artifacts

| TRACE-PACK | Masked pre-lab APDU trace fixture | trace | `docs/prelab_apdu_trace_pack.jsonl` | generated | `cargo run --quiet --example krn_prelab_trace_pack` | full lab trace pack remains external |

| NO-CRASH | Parser/APDU no-crash smoke artifact | quality | `docs/prelab_no_crash_smoke.json` | generated | `cargo run --quiet --example krn_prelab_no_crash_smoke` | not a fuzzing report |
| STATIC-FUZZ-PLAN | Static and fuzz evidence plan | quality | `docs/prelab_static_fuzz_plan.json` | generated | `cargo run --quiet --example krn_prelab_static_fuzz_plan` | plan only; accepted reports remain external |
| FUZZ-SEEDS | Fuzz seed corpus manifest | quality | `docs/prelab_fuzz_seed_corpus.json` | generated | `cargo run --quiet --example krn_prelab_fuzz_seed_corpus` | hash-only synthetic seed evidence |
| STANDARDS-WATCH | Public standards watch | drift | `docs/public_standards_watch.json` | generated | `cargo run --quiet --example krn_public_standards_watch` | public drift signal only |
| REPORT-PACK | Certification report pack | reporting | `docs/certification_report_pack.json; docs/certification_report_pack.md` | generated | `cargo run --quiet --example krn_certification_report_ui` | index only; external report attachments remain required |
| REPORT-UI | Certification report workbench | reporting | `docs/certification_report_ui.html` | generated | `cargo run --quiet --example krn_certification_report_ui -- --html` | static local UI; not a lab portal or approval system |
| COVERAGE-WORKFLOW | 100% coverage workflow | quality | `docs/coverage.md; scripts/coverage_100.sh` | prepared | `scripts/coverage_100.sh` | accepted submitted-build report remains external |

</script><script>const data=JSON.parse(document.getElementById('report-data').textContent);const markdown=document.getElementById('report-markdown').textContent;const q=document.getElementById('search');const views=['artifacts','reports','tools'];function esc(v){return String(v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}function cell(v,cls=''){return `<td class="${cls}">${esc(v)}</td>`;}function render(){const term=q.value.toLowerCase();document.getElementById('kernel').textContent=`${data.kernel_name} ${data.kernel_version}`;document.getElementById('abi').textContent=`ABI ${data.abi_version}`;document.getElementById('scope').textContent=data.scope;document.getElementById('artifact-count').textContent=data.artifacts.length;document.getElementById('report-count').textContent=data.required_reports.length;document.getElementById('tool-count').textContent=data.tool_commands.length;document.getElementById('open-count').textContent=data.does_not_close.length;const match=o=>JSON.stringify(o).toLowerCase().includes(term);document.getElementById('artifact-body').innerHTML=data.artifacts.filter(match).map(a=>`<tr>${cell(a.id,'mono')}${cell(a.title)}${cell(a.category)}${cell(a.path,'mono')}${cell(a.status,a.status==='generated'?'ok':'')}${cell(a.generator,'mono')}${cell(a.boundary)}</tr>`).join('');document.getElementById('report-body').innerHTML=data.required_reports.filter(match).map(r=>`<tr>${cell(r.id,'mono')}${cell(r.title)}${cell(r.status,'status')}${cell(r.required_evidence)}${cell(r.closure_gate,'mono')}</tr>`).join('');document.getElementById('tool-body').innerHTML=data.tool_commands.filter(match).map(t=>`<tr>${cell(t.id,'mono')}${cell(t.title)}${cell(t.command,'mono')}${cell(t.output,'mono')}</tr>`).join('');}function show(view){views.forEach(v=>document.getElementById(v).classList.toggle('hidden',v!==view));document.querySelectorAll('[data-view]').forEach(b=>b.setAttribute('aria-pressed',String(b.dataset.view===view)));}function download(name,type,text){const blob=new Blob([text],{type});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();URL.revokeObjectURL(a.href);}document.querySelectorAll('[data-view]').forEach(b=>b.addEventListener('click',()=>show(b.dataset.view)));document.getElementById('download-json').addEventListener('click',()=>download('hyperion-certification-report-pack.json','application/json',JSON.stringify(data,null,2)));document.getElementById('download-md').addEventListener('click',()=>download('hyperion-certification-report-pack.md','text/markdown',markdown));q.addEventListener('input',render);render();</script></body></html>
