name: Pre-Lab Quality Gates

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  rust-quality:
    name: Rust quality and evidence drift
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Format
        run: cargo fmt --check

      - name: Unit and integration tests
        run: cargo test

      - name: Example evidence generators
        run: cargo test --examples

      - name: Static analysis
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: ABI conformance statement drift
        run: cargo run --quiet --example krn_abi_conformance_statement | diff -u docs/abi_conformance_statement.json -

      - name: Pre-lab trace pack drift
        run: cargo run --quiet --example krn_prelab_trace_pack | diff -u docs/prelab_apdu_trace_pack.jsonl -

      - name: Pre-lab trace pack audit drift
        run: cargo run --quiet --example krn_trace_pack_audit -- --path docs/prelab_apdu_trace_pack.jsonl --require-prelab-fixture | diff -u docs/prelab_trace_pack_audit.json -

      - name: Pre-lab trace pack audit markdown drift
        run: cargo run --quiet --example krn_trace_pack_audit -- --path docs/prelab_apdu_trace_pack.jsonl --markdown | diff -u docs/prelab_trace_pack_audit.md -

      - name: Scheme profile dictionary drift
        run: cargo run --quiet --example krn_scheme_profile_dictionary | diff -u docs/scheme_profile_dictionary.md -

      - name: Pre-lab quality gate manifest drift
        run: cargo run --quiet --example krn_prelab_quality_gates | diff -u docs/prelab_quality_gates.json -

      - name: No-crash smoke artifact drift
        run: cargo run --quiet --example krn_prelab_no_crash_smoke | diff -u docs/prelab_no_crash_smoke.json -

      - name: Static and fuzz plan drift
        run: cargo run --quiet --example krn_prelab_static_fuzz_plan | diff -u docs/prelab_static_fuzz_plan.json -

      - name: Fuzz seed corpus drift
        run: cargo run --quiet --example krn_prelab_fuzz_seed_corpus | diff -u docs/prelab_fuzz_seed_corpus.json -

      - name: Public standards watch drift
        run: cargo run --quiet --example krn_public_standards_watch | diff -u docs/public_standards_watch.json -

      - name: Tooling completeness audit JSON drift
        run: cargo run --quiet --example krn_tooling_completeness_audit -- --json | diff -u docs/tooling_completeness_audit.json -

      - name: Tooling completeness audit Markdown drift
        run: cargo run --quiet --example krn_tooling_completeness_audit -- --markdown | diff -u docs/tooling_completeness_audit.md -

      - name: Data-driven certification bundle artifact drift
        run: |
          cargo run --quiet --example krn_certification_bundle -- --out target/hyperion-cert-bundle
          diff -u docs/certification_data_bundle.json target/hyperion-cert-bundle/certification_bundle.json
          diff -u docs/certification_data_bundle_trust_anchors.json target/hyperion-cert-bundle/trust_anchors.json
          diff -u docs/certification_data_bundle.md target/hyperion-cert-bundle/certification_bundle_report.md
          diff -u docs/certification_data_bundle_workbench.html target/hyperion-cert-bundle/index.html
          diff -u docs/certification_data_bundle_fingerprints.json target/hyperion-cert-bundle/bundle_fingerprints.json
          diff -u docs/certification_data_bundle_lint.json target/hyperion-cert-bundle/certification_bundle_lint.json
          diff -u docs/certification_data_bundle_lint.md target/hyperion-cert-bundle/certification_bundle_lint.md

      - name: Checked-in certification bundle validation
        run: cargo run --quiet --example krn_certification_bundle -- --validate --bundle docs/certification_data_bundle.json --trust-anchors docs/certification_data_bundle_trust_anchors.json

      - name: Checked-in certification bundle lint
        run: cargo run --quiet --example krn_certification_bundle -- --lint --bundle docs/certification_data_bundle.json --trust-anchors docs/certification_data_bundle_trust_anchors.json


      - name: Certification evidence checklist JSON drift
        run: cargo run --quiet --example krn_certification_evidence_checklist -- --json | diff -u docs/certification_evidence_checklist.json -

      - name: Certification evidence checklist Markdown drift
        run: cargo run --quiet --example krn_certification_evidence_checklist -- --markdown | diff -u docs/certification_evidence_checklist.md -

      - name: Certification evidence intake JSON drift
        run: cargo run --quiet --example krn_certification_evidence_intake -- --json | diff -u docs/certification_evidence_intake.json -

      - name: Certification evidence intake Markdown drift
        run: cargo run --quiet --example krn_certification_evidence_intake -- --markdown | diff -u docs/certification_evidence_intake.md -

      - name: Certification attachment audit smoke
        run: cargo run --quiet --example krn_certification_attachment_audit -- --root target/hyperion-cert-attachments

      - name: Certification freeze manifest JSON drift
        run: cargo run --quiet --example krn_certification_freeze_manifest -- --json | diff -u docs/certification_freeze_manifest.json -

      - name: Certification freeze manifest Markdown drift
        run: cargo run --quiet --example krn_certification_freeze_manifest -- --markdown | diff -u docs/certification_freeze_manifest.md -

      - name: Certification security assessment plan JSON drift
        run: cargo run --quiet --example krn_certification_security_assessment_plan -- --json | diff -u docs/certification_security_assessment_plan.json -

      - name: Certification security assessment plan Markdown drift
        run: cargo run --quiet --example krn_certification_security_assessment_plan -- --markdown | diff -u docs/certification_security_assessment_plan.md -

      - name: Certification device evidence plan JSON drift
        run: cargo run --quiet --example krn_certification_device_evidence_plan -- --json | diff -u docs/certification_device_evidence_plan.json -

      - name: Certification device evidence plan Markdown drift
        run: cargo run --quiet --example krn_certification_device_evidence_plan -- --markdown | diff -u docs/certification_device_evidence_plan.md -

      - name: Certification integration report plan JSON drift
        run: cargo run --quiet --example krn_certification_integration_report_plan -- --json | diff -u docs/certification_integration_report_plan.json -

      - name: Certification integration report plan Markdown drift
        run: cargo run --quiet --example krn_certification_integration_report_plan -- --markdown | diff -u docs/certification_integration_report_plan.md -

      - name: Certification report UI drift
        run: cargo run --quiet --example krn_certification_report_ui -- --html | diff -u docs/certification_report_ui.html -

      - name: Certification report JSON drift
        run: cargo run --quiet --example krn_certification_report_ui -- --json | diff -u docs/certification_report_pack.json -

      - name: Certification report Markdown drift
        run: cargo run --quiet --example krn_certification_report_ui -- --markdown | diff -u docs/certification_report_pack.md -

      - name: Certification workspace smoke
        run: cargo run --quiet --example krn_certification_workspace -- --out target/hyperion-cert-workspace

      - name: Basic PoS integration smoke
        run: cargo run --quiet --example krn_basic_pos

      - name: Callback timeout policy smoke
        run: cargo run --quiet --example krn_callback_timeout_policy

      - name: Variable data boundary audit
        run: cargo run --quiet --example krn_variable_data_boundary_audit -- src

      - name: Whitespace
        run: git diff --check

  rust-coverage:
    name: Rust enforced 100% coverage report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage measurement artifact
        run: scripts/coverage_100.sh
        env:
          KRN_COVERAGE_ENFORCE: "1"

      - name: Audit coverage package
        run: cargo run --quiet --example krn_coverage_package_audit -- --root target/coverage --require-package > target/coverage/coverage_audit.json

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: hyperion-coverage-html
          path: target/coverage
          if-no-files-found: error
